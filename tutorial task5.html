<!DOCTYPE html>
<html>
<head>
    <title>Ordered and Unordered Lists</title>
</head>
<body>

    <h1>Lists in HTML</h1>

    <h2>Ordered List</h2>
    <ol>
        <li>Wake Up</li>
        <li>Get Ready</li>
        <li>Attend Classes</li>
        <li>Study</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>Books</li>
        <li>Pen</li>
        <li>Notebook</li>
        <li>Bag</li>
    </ul>

    <h2>Nested List</h2>
    <ul>
        <li>Programming Languages
            <ol>
                <li>Java</li>
                <li>Python</li>
                <li>C</li>
            </ol>
        </li>
        <li>Web Technologies
            <ol>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ol>
        </li>
    </ul>

</body>
</html>
