<!DOCTYPE html>
<html>
<head>
    <title>Event Registration Form</title>
</head>
<body>

    <h1>College Technical Fest Registration</h1>

    <form>

        <label>Participant Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Roll Number:</label><br>
        <input type="text" name="rollno"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Mobile Number:</label><br>
        <input type="tel" name="mobile"><br><br>

        <label>College Name:</label><br>
        <input type="text" name="college"><br><br>

        <label>Select Event:</label><br>
        <select name="event">
            <option>Paper Presentation</option>
            <option>Poster Presentation</option>
            <option>Project Expo</option>
            <option>Quiz Competition</option>
            <option>Coding Contest</option>
        </select><br><br>

        <label>Participation Type:</label><br>
        <input type="radio" name="type"> Individual
        <input type="radio" name="type"> Team
        <br><br>

        <label>Areas of Interest:</label><br>
        <input type="checkbox"> Artificial Intelligence<br>
        <input type="checkbox"> Web Development<br>
        <input type="checkbox"> Cyber Security<br>
        <input type="checkbox"> Data Science<br><br>

        <label>Additional Remarks:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
